repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict

  # GitHub Actions workflows linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        files: '^\.github/workflows/.*\.ya?ml$'

  # JavaScript linting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: eslint
        files: '^\.github/actions/.*\.js$'
        additional_dependencies:
          - "eslint@8.56.0"

  # Shell/Bash scripts linting
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        files: '\.(sh|bash)$'

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2

  # Dockerfile linting:
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1
    hooks:
      - id: hadolint-docker
        name: hadolint (Dockerfile)
        files: "(^|/)(Dockerfile|.*Dockerfile.*)$"

  # Auto-format via Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '\.(json|ya?ml|md|html|css|scss|less|js|jsx|ts|tsx)$'
        args: ["--no-cache"]

  # Prevent secrets from being committed:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

exclude: 'node_modules/.*|dist/.*|build/.*|\.git/.*|\.ruff_cache/.*|\.mypy_cache/.*|venv/.*|\.venv/.*|coverage/.*|__pycache__/.*'
